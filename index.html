<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PON Calculator by Yudha</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</head>
<body>

<div class="card">

<div class="header">
PON Calculator by Yudha
</div>

<div class="content">

<label>Input Laser</label>
<input type="text" id="inputLaser" placeholder="Masukkan nilai dBm">

<label>Splitter Ratio</label>
<select id="splitterRatio">
<option value="0_0">Tanpa Ratio</option>
<option value="22_0.25">01:99</option>
<option value="19_0.30">02:98</option>
<option value="17.6_0.35">03:97</option>
<option value="16.2_0.38">04:96</option>
<option value="14.8_0.42">05:95</option>
<option value="14.14_0.86">06:94</option>
<option value="13.48_0.92">07:93</option>
<option value="12.82_0.98">08:92</option>
<option value="12.16_1.04">09:91</option>
<option value="11.5_1.10">10:90</option>
<option value="10.4_1.22">12:88</option>
<option value="9.75_1.35">15:85</option>
<option value="8.7_1.55">18:82</option>
<option value="8_1.70">20:80</option>
<option value="7.6_1.80">22:78</option>
<option value="7_1.95">25:75</option>
<option value="6.7_2.10">28:72</option>
<option value="6.4_2.30">30:70</option>
<option value="5.35_2.70">35:65</option>
<option value="4.7_3.10">40:60</option>
<option value="4.05_3.30">45:55</option>
<option value="3.4_3.40">50:50</option>

</select>

<label>Splitter PLC</label>

<select id="splitterPLC">
  
<option value="0">Tanpa Splitter</option>
<option value="3.25">1:2</option>
<option value="7">1:4</option>
<option value="10">1:8</option>
<option value="13.5">1:16</option>
<option value="17">1:32</option>
<option value="20">1:64</option>

</select>

<label>Output Laser</label>
<input type="text" id="outputLaser" readonly>

<label>Next ODP</label>
<input type="text" id="nextODP" readonly>

<div class="button-group">
<button onclick="hitung()">Hitung</button>
<button onclick="resetForm()">Reset</button>
</div>
</div>
<div class="footer-donasi">
  <p>Donasi</p>
  <p>Bank Jago: 104745237860</p>
  <p>A.N RIZKY YUDHA APRIANI</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
